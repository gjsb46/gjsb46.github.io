name: Build and Publish

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Pandoc
        run: sudo apt-get install -y pandoc texlive-xetex
      
      - name: Build HTML
        run: |
          pandoc ENGL101/index.md \
            --standalone \
            -o ENGL101/index.html
      
      - name: Build PDF
        run: |
          pandoc ENGL101/index.md \
            --pdf-engine=xelatex \
            -o ENGL101/syllabus.pdf
      
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
